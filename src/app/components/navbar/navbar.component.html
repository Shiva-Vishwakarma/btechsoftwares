<nav
  [class]="
    'fixed w-full z-50 transition-all duration-300 ' +
    (isScrolled ? 'bg-white shadow-lg' : 'bg-transparent')
  "
>
  <div class="container mx-auto px-4">
    <div class="flex justify-between items-center py-4">
      <!-- Logo Section -->
      <a
        routerLink="/"
        class="flex items-center space-x-2 transition-all duration-300 group"
      >
        <!-- Show Logo if exists -->
        <div *ngIf="logoExists" class="flex items-center">
          <img
            [src]="logoPath"
            [alt]="logoText"
            class="h-10 w-auto transition-all duration-300"
            [class.filter]="!isScrolled"
            [class.brightness-0]="!isScrolled"
            [class.invert]="!isScrolled"
          />
          <span
            class="ml-2 text-xl font-bold transition-colors duration-300"
            [class.text-gray-900]="isScrolled"
            [class.text-white]="!isScrolled"
          >
            {{ logoText }}
          </span>
        </div>

        <!-- Show Text Only if Logo doesn't exist -->
        <div *ngIf="!logoExists" class="flex items-center">
          <span
            class="text-2xl font-bold transition-colors duration-300"
            [class.text-primary-600]="isScrolled"
            [class.text-white]="!isScrolled"
          >
            {{ logoText }}
          </span>
        </div>
      </a>

      <!-- Desktop Menu -->
      <div class="hidden md:flex items-center space-x-8">
        <a
          *ngFor="let item of navItems"
          routerLink="{{ item.path }}"
          routerLinkActive="text-primary-600"
          [class]="
            'transition-colors duration-300 font-medium ' +
            (isScrolled
              ? 'text-gray-700 hover:text-primary-600'
              : 'text-white hover:text-primary-200')
          "
          [routerLinkActiveOptions]="{ exact: item.path === '/' }"
        >
          {{ item.label }}
        </a>
        <button
          mat-raised-button
          color="primary"
          routerLink="/contact"
          class="ml-4"
        >
          Get Started
        </button>
      </div>

      <!-- Mobile Menu Button -->
      <button
        (click)="toggleMenu()"
        class="md:hidden focus:outline-none"
        [class.text-gray-900]="isScrolled"
        [class.text-white]="!isScrolled"
      >
        <svg
          *ngIf="!isMenuOpen"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          class="w-6 h-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
        <svg
          *ngIf="isMenuOpen"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          class="w-6 h-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <!-- Mobile Menu Dropdown -->
    <div
      *ngIf="isMenuOpen"
      @fadeInOut
      class="md:hidden bg-white rounded-lg shadow-lg mt-2 mb-4"
    >
      <div class="flex flex-col py-4">
        <a
          *ngFor="let item of navItems"
          routerLink="{{ item.path }}"
          (click)="closeMenu()"
          routerLinkActive="text-primary-600"
          class="px-4 py-3 text-gray-700 hover:bg-gray-100 hover:text-primary-600 transition-colors duration-300"
        >
          {{ item.label }}
        </a>
        <div class="px-4 pt-2 pb-3">
          <button
            mat-raised-button
            color="primary"
            routerLink="/contact"
            class="w-full"
            (click)="closeMenu()"
          >
            Get Started
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
