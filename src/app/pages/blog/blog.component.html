<!-- Hero Section -->
<section
  class="bg-gradient-to-r from-primary-600 to-primary-800 text-white py-20"
>
  <div class="container mx-auto px-4 text-center">
    <h1 class="text-4xl md:text-5xl font-bold mb-4">Our Blog</h1>
    <p class="text-xl text-gray-200 max-w-2xl mx-auto">
      Insights, thoughts, and inspiration from our team
    </p>
  </div>
</section>

<!-- Blog Section -->
<section class="py-20">
  <div class="container mx-auto px-4">
    <!-- Search and Filter -->
    <div class="mb-12">
      <div class="flex flex-col md:flex-row gap-4 justify-between items-center">
        <!-- Search Bar -->
        <div class="relative w-full md:w-96">
          <input
            type="text"
            placeholder="Search articles..."
            (input)="onSearch($event)"
            class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-600 focus:border-transparent"
          />
          <svg
            class="absolute left-3 top-3.5 w-5 h-5 text-gray-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            />
          </svg>
        </div>

        <!-- Category Filters -->
        <div class="flex flex-wrap gap-2">
          <button
            *ngFor="let category of categories"
            (click)="selectCategory(category)"
            [class]="
              selectedCategory === category
                ? 'bg-primary-600 text-white'
                : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
            "
            class="px-4 py-2 rounded-full transition-all duration-300 text-sm font-medium"
          >
            {{ category }}
          </button>
        </div>
      </div>
    </div>

    <!-- Blog Grid -->
    <div *ngIf="loading" class="text-center py-12">
      <mat-spinner diameter="50" class="mx-auto"></mat-spinner>
    </div>

    <div
      *ngIf="!loading && filteredBlogs.length > 0"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
    >
      <app-blog-card
        *ngFor="let post of filteredBlogs"
        [post]="post"
      ></app-blog-card>
    </div>

    <!-- No Results Message -->
    <div
      *ngIf="!loading && filteredBlogs.length === 0"
      class="text-center py-12"
    >
      <svg
        class="w-24 h-24 text-gray-300 mx-auto mb-4"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
        />
      </svg>
      <h3 class="text-xl font-semibold mb-2">No articles found</h3>
      <p class="text-gray-500">
        Try adjusting your search or filter to find what you're looking for.
      </p>
    </div>
  </div>
</section>

<!-- Newsletter Section -->
<section class="py-20 bg-gray-50">
  <div class="container mx-auto px-4 text-center">
    <h2 class="text-3xl font-bold mb-4">Subscribe to Our Newsletter</h2>
    <p class="text-gray-600 mb-8 max-w-2xl mx-auto">
      Get the latest articles, tutorials, and insights delivered straight to
      your inbox.
    </p>
    <div class="flex flex-col sm:flex-row gap-4 max-w-md mx-auto">
      <input
        type="email"
        placeholder="Enter your email"
        class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-600"
      />
      <button mat-raised-button color="primary" class="px-8 py-2">
        Subscribe
      </button>
    </div>
  </div>
</section>
