<!-- Hero Section -->
<section
  class="bg-gradient-to-r from-primary-600 to-primary-800 text-white py-20"
>
  <div class="container mx-auto px-4 text-center">
    <h1 class="text-4xl md:text-5xl font-bold mb-4">Our Portfolio</h1>
    <p class="text-xl text-gray-200 max-w-2xl mx-auto">
      Explore our latest projects and see how we've helped businesses succeed
    </p>
  </div>
</section>

<!-- Portfolio Section -->
<section class="py-20">
  <div class="container mx-auto px-4">
    <!-- Category Filters -->
    <div class="flex flex-wrap justify-center gap-3 mb-12">
      <button
        *ngFor="let category of categories"
        (click)="selectCategory(category)"
        [class]="
          selectedCategory === category
            ? 'bg-primary-600 text-white shadow-lg'
            : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
        "
        class="px-6 py-2 rounded-full transition-all duration-300 font-medium"
      >
        {{ category }}
      </button>
    </div>

    <!-- Portfolio Grid -->
    <div *ngIf="loading" class="text-center py-12">
      <mat-spinner diameter="50" class="mx-auto"></mat-spinner>
    </div>

    <div
      *ngIf="!loading"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
    >
      <app-portfolio-card
        *ngFor="let project of displayedPortfolio"
        [project]="project"
      ></app-portfolio-card>
    </div>

    <!-- No Results Message -->
    <div
      *ngIf="!loading && displayedPortfolio.length === 0"
      class="text-center py-12"
    >
      <svg
        class="w-24 h-24 text-gray-300 mx-auto mb-4"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
        ></path>
      </svg>
      <p class="text-gray-500 text-lg">No projects found in this category.</p>
    </div>

    <!-- Load More Button -->
    <div
      *ngIf="!loading && showLoadMore && displayedPortfolio.length > 0"
      class="text-center mt-12"
    >
      <button
        (click)="loadMore()"
        mat-raised-button
        color="primary"
        class="px-8 py-3 text-lg font-semibold transition-all duration-300 hover:scale-105"
      >
        Load More Projects
        <svg
          class="w-5 h-5 inline-block ml-2"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 14l-7 7-7-7m14-6l-7 7-7-7"
          ></path>
        </svg>
      </button>

      <!-- Progress Indicator -->
      <!-- <div class="mt-4 text-sm text-gray-500">
        Showing {{ displayedPortfolio.length }} of
        {{ filteredPortfolio.length }} projects
      </div> -->
    </div>

    <!-- Optional: Show all projects count -->
    <!-- <div
      *ngIf="!loading && !showLoadMore && filteredPortfolio.length > 0"
      class="text-center mt-12"
    >
      <div
        class="inline-block bg-green-50 text-green-600 px-6 py-3 rounded-full"
      >
        <svg
          class="w-5 h-5 inline-block mr-2"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M5 13l4 4L19 7"
          ></path>
        </svg>
        All {{ filteredPortfolio.length }} projects loaded
      </div>
    </div> -->
  </div>
</section>

<!-- CTA Section -->
<section class="py-20 bg-gray-50">
  <div class="container mx-auto px-4 text-center">
    <h2 class="text-3xl font-bold mb-4">Ready to Start Your Project?</h2>
    <p class="text-gray-600 mb-8 max-w-2xl mx-auto">
      Let's create something amazing together. Contact us today to discuss your
      project.
    </p>
    <button
      mat-raised-button
      color="primary"
      class="px-8 py-3 text-lg transition-all duration-300 hover:scale-105"
      routerLink="/contact"
    >
      Start a Project
      <svg
        class="w-5 h-5 inline-block ml-2"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M17 8l4 4m0 0l-4 4m4-4H3"
        ></path>
      </svg>
    </button>
  </div>
</section>
