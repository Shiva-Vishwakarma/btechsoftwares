<div *ngIf="loading" class="flex justify-center items-center min-h-screen">
  <mat-spinner diameter="50"></mat-spinner>
</div>

<div *ngIf="!loading && member" class="pb-20">
  <!-- Hero Section with Proper Spacing -->
  <div
    class="relative bg-gradient-to-r from-primary-600 to-primary-800 pt-32 pb-20"
  >
    <div class="absolute inset-0 bg-black bg-opacity-30"></div>
    <div class="relative container mx-auto px-4">
      <div class="text-center md:text-left">
        <div class="inline-block mb-4">
          <span
            class="bg-white/20 backdrop-blur-sm rounded-full px-4 py-1 text-sm font-semibold text-white"
          >
            Team Member
          </span>
        </div>
        <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold text-white mb-4">
          {{ member.name }}
        </h1>
        <p class="text-xl text-primary-100 mb-4">
          {{ member.position }}
        </p>
        <div class="flex flex-wrap gap-3 mt-4">
          <div class="flex items-center text-white/80">
            <svg
              class="w-5 h-5 mr-2"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
              ></path>
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"
              ></path>
            </svg>
            <span>Based in Global</span>
          </div>
          <div class="flex items-center text-white/80">
            <svg
              class="w-5 h-5 mr-2"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
              ></path>
            </svg>
            <span>Full-time Member</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Profile Section with Better Spacing -->
  <div class="container mx-auto px-4 -mt-16">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      <div class="grid grid-cols-1 lg:grid-cols-3">
        <!-- Profile Image -->
        <div
          class="lg:col-span-1 bg-gradient-to-br from-gray-50 to-gray-100 p-6"
        >
          <div class="relative group">
            <div
              class="absolute inset-0 bg-gradient-to-r from-primary-600 to-primary-800 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-300 blur-md"
            ></div>
            <img
              [src]="member.image"
              [alt]="member.name"
              class="relative w-full h-auto rounded-2xl shadow-xl transform group-hover:scale-105 transition-transform duration-500 object-cover"
              style="aspect-ratio: 1/1; object-fit: cover"
            />
            <div
              class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-20 rounded-2xl transition-all duration-300"
            ></div>
          </div>

          <!-- Quick Info Cards -->
          <div class="mt-6 space-y-3">
            <div class="bg-white rounded-lg p-3 shadow-sm">
              <div class="flex items-center space-x-2 text-gray-600">
                <svg
                  class="w-4 h-4 text-primary-600"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                  ></path>
                </svg>
                <span class="text-sm">Joined in 2020</span>
              </div>
            </div>
            <div class="bg-white rounded-lg p-3 shadow-sm">
              <div class="flex items-center space-x-2 text-gray-600">
                <svg
                  class="w-4 h-4 text-primary-600"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
                  ></path>
                </svg>
                <span class="text-sm">Expert Level</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Profile Details -->
        <div class="lg:col-span-2 p-8 md:p-10">
          <!-- Bio Section -->
          <div class="mb-8 mt-16">
            <div class="flex items-center mb-4">
              <div
                class="w-1 h-8 bg-gradient-to-b from-primary-600 to-primary-400 rounded-full mr-3"
              ></div>
              <h2 class="text-2xl font-bold text-gray-800">Biography</h2>
            </div>
            <p class="text-gray-600 leading-relaxed">{{ member.bio }}</p>
          </div>

          <!-- Skills Section -->
          <div class="mb-8">
            <div class="flex items-center mb-4">
              <div
                class="w-1 h-8 bg-gradient-to-b from-primary-600 to-primary-400 rounded-full mr-3"
              ></div>
              <h3 class="text-xl font-bold text-gray-800">
                Skills & Expertise
              </h3>
            </div>
            <div class="flex flex-wrap gap-2">
              <span
                *ngFor="let skill of member.skills"
                class="px-4 py-2 bg-gradient-to-r from-primary-50 to-primary-100 text-primary-700 rounded-lg text-sm font-medium hover:shadow-md transition-all duration-300 cursor-default"
              >
                {{ skill }}
              </span>
            </div>
          </div>

          <!-- Social Links -->
          <div>
            <div class="flex items-center mb-4">
              <div
                class="w-1 h-8 bg-gradient-to-b from-primary-600 to-primary-400 rounded-full mr-3"
              ></div>
              <h3 class="text-xl font-bold text-gray-800">Connect & Follow</h3>
            </div>
            <div class="flex flex-wrap gap-3">
              <a
                *ngIf="member.socialLinks.linkedin"
                [href]="member.socialLinks.linkedin"
                target="_blank"
                class="group w-12 h-12 bg-gradient-to-r from-gray-100 to-gray-50 hover:from-primary-600 hover:to-primary-700 rounded-xl flex items-center justify-center transition-all duration-300 hover:shadow-lg transform hover:-translate-y-1"
              >
                <svg
                  class="w-5 h-5 text-gray-600 group-hover:text-white transition-colors duration-300"
                  fill="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"
                  />
                  <circle cx="4" cy="4" r="2" />
                </svg>
              </a>
              <a
                *ngIf="member.socialLinks.twitter"
                [href]="member.socialLinks.twitter"
                target="_blank"
                class="group w-12 h-12 bg-gradient-to-r from-gray-100 to-gray-50 hover:from-primary-600 hover:to-primary-700 rounded-xl flex items-center justify-center transition-all duration-300 hover:shadow-lg transform hover:-translate-y-1"
              >
                <svg
                  class="w-5 h-5 text-gray-600 group-hover:text-white transition-colors duration-300"
                  fill="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"
                  />
                </svg>
              </a>
              <a
                *ngIf="member.socialLinks.github"
                [href]="member.socialLinks.github"
                target="_blank"
                class="group w-12 h-12 bg-gradient-to-r from-gray-100 to-gray-50 hover:from-primary-600 hover:to-primary-700 rounded-xl flex items-center justify-center transition-all duration-300 hover:shadow-lg transform hover:-translate-y-1"
              >
                <svg
                  class="w-5 h-5 text-gray-600 group-hover:text-white transition-colors duration-300"
                  fill="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"
                  />
                </svg>
              </a>
            </div>
          </div>

          <!-- Contact CTA -->
          <!-- <div class="mt-8 pt-6 border-t border-gray-200">
            <div
              class="bg-gradient-to-r from-primary-50 to-indigo-50 rounded-xl p-4"
            >
              <div class="flex flex-wrap items-center justify-between gap-4">
                <div>
                  <p class="text-sm text-gray-600 mb-1">
                    Interested in working together?
                  </p>
                  <p class="font-semibold text-gray-800">
                    Contact {{ member.name.split(" ")[0] }} directly
                  </p>
                </div>
                <button
                  mat-raised-button
                  color="primary"
                  class="!px-6 !py-2"
                  routerLink="/contact"
                >
                  Send Message
                </button>
              </div>
            </div>
          </div> -->
        </div>
      </div>
    </div>
  </div>

  <!-- Back to Team Button -->
  <div class="container mx-auto px-4 mt-12 text-center">
    <button
      mat-stroked-button
      color="primary"
      routerLink="/team"
      class="px-8 py-2 hover:bg-primary-600 hover:text-white transition-all duration-300 rounded-lg"
    >
      <svg
        class="w-4 h-4 inline-block mr-2"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 19l-7-7m0 0l7-7m-7 7h18"
        ></path>
      </svg>
      Back to Team
    </button>
  </div>
</div>
