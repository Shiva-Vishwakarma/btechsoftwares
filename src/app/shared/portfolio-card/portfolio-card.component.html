<mat-card
  class="group overflow-hidden cursor-pointer hover:shadow-xl transition-all duration-300"
>
  <div class="relative overflow-hidden h-64">
    <img
      [src]="project.image"
      [alt]="project.title"
      class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
    />
    <div
      class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-60 transition-all duration-300 flex items-center justify-center"
    >
      <button
        mat-raised-button
        color="primary"
        [routerLink]="['/portfolio', project.id]"
        class="opacity-0 group-hover:opacity-100 transition-all duration-300"
      >
        View Project
      </button>
    </div>
  </div>
  <div class="p-6">
    <span class="text-primary-600 text-sm font-semibold">{{
      project.category
    }}</span>
    <h3 class="text-xl font-bold mt-2 mb-2">{{ project.title }}</h3>
    <p class="text-gray-600 text-sm mb-3">
      {{ project.description | slice: 0 : 100 }}...
    </p>
    <div class="flex flex-wrap gap-2 mt-3">
      <mat-chip
        *ngFor="let tech of project.technologies.slice(0, 3)"
        class="text-xs"
      >
        {{ tech }}
      </mat-chip>
    </div>
  </div>
</mat-card>
