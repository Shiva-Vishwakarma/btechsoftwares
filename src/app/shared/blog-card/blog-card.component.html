<mat-card
  class="group hover:shadow-xl transition-all duration-300 hover:-translate-y-2 cursor-pointer"
  [routerLink]="['/blog', post.id]"
>
  <div class="relative overflow-hidden h-48 rounded-t-lg">
    <img
      [src]="post.image"
      [alt]="post.title"
      class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
    />
  </div>
  <div class="p-6">
    <div class="flex items-center justify-between mb-3">
      <span class="text-primary-600 text-sm font-semibold">{{
        post.category
      }}</span>
      <div class="flex items-center text-gray-500 text-sm">
        <svg
          class="w-4 h-4 mr-1"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
        {{ post.readTime }} min read
      </div>
    </div>
    <h3 class="text-xl font-bold mb-2 line-clamp-2">{{ post.title }}</h3>
    <p class="text-gray-600 text-sm mb-4 line-clamp-3">{{ post.excerpt }}</p>
    <div class="flex items-center justify-between">
      <div class="flex items-center">
        <div
          class="w-8 h-8 bg-primary-100 rounded-full flex items-center justify-center"
        >
          <span class="text-primary-600 font-semibold text-sm">{{
            post.author.charAt(0)
          }}</span>
        </div>
        <span class="text-sm text-gray-600 ml-2">{{ post.author }}</span>
      </div>
      <span class="text-sm text-gray-500">{{
        post.date | date: "MMM d, yyyy"
      }}</span>
    </div>
  </div>
</mat-card>
