<mat-card
  class="group relative overflow-hidden hover:shadow-2xl transition-all duration-500 hover:-translate-y-2"
>
  <!-- Quote Icon Background -->
  <div class="absolute top-4 right-4 opacity-10">
    <svg
      class="w-16 h-16 text-primary-600"
      fill="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"
      />
    </svg>
  </div>

  <div class="p-6 md:p-8">
    <!-- Rating Stars -->
    <div class="flex mb-4">
      <svg
        *ngFor="let star of getStarsArray()"
        class="w-5 h-5 text-yellow-400 fill-current"
        viewBox="0 0 20 20"
      >
        <path
          d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.54-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"
        />
      </svg>
    </div>

    <!-- Testimonial Text -->
    <p class="text-gray-600 leading-relaxed mb-6 italic">"{{ text }}"</p>

    <!-- Author Info -->
    <div class="flex items-center">
      <img
        [src]="image"
        [alt]="name"
        class="w-12 h-12 rounded-full object-cover mr-4 border-2 border-primary-600"
      />
      <div>
        <h4 class="font-bold text-gray-900">{{ name }}</h4>
        <p class="text-sm text-gray-500">
          {{ position }}<span *ngIf="company"> at {{ company }}</span>
        </p>
      </div>
    </div>
  </div>

  <!-- Animated Border on Hover -->
  <div
    class="absolute bottom-0 left-0 w-0 h-1 bg-primary-600 group-hover:w-full transition-all duration-500"
  ></div>
</mat-card>
