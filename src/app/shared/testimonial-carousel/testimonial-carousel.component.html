<div
  class="testimonial-carousel relative"
  (mouseenter)="autoPlay ? stopAutoPlay() : null"
  (mouseleave)="autoPlay ? startAutoPlay() : null"
  (touchstart)="onTouchStart($event)"
  (touchend)="onTouchEnd($event)"
>
  <!-- Main Testimonial Card -->
  <div class="relative min-h-[400px] md:min-h-[350px]">
    <div
      *ngIf="getCurrentTestimonial()"
      @slideAnimation
      class="testimonial-card"
    >
      <mat-card class="bg-white rounded-2xl shadow-2xl overflow-hidden">
        <div class="p-8 md:p-12">
          <!-- Quote Icon -->
          <div class="absolute top-6 right-6 opacity-10">
            <svg
              class="w-16 h-16 text-primary-600"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"
              />
            </svg>
          </div>

          <!-- Rating Stars -->
          <div class="flex justify-center mb-6">
            <svg
              *ngFor="let star of getStarsArray(getCurrentTestimonial().rating)"
              class="w-6 h-6 text-yellow-400 fill-current mx-0.5"
              viewBox="0 0 20 20"
            >
              <path
                d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.54-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"
              />
            </svg>
          </div>

          <!-- Testimonial Text -->
          <p
            class="text-gray-700 text-lg md:text-xl leading-relaxed text-center mb-8 italic"
          >
            "{{ getCurrentTestimonial().text }}"
          </p>

          <!-- Author Info -->
          <div class="flex items-center justify-center">
            <div class="relative">
              <img
                [src]="getCurrentTestimonial().image"
                [alt]="getCurrentTestimonial().name"
                class="w-16 h-16 rounded-full object-cover border-4 border-primary-600 shadow-lg"
              />
              <div
                class="absolute -bottom-1 -right-1 bg-green-500 rounded-full p-1 border-2 border-white"
              >
                <svg
                  class="w-3 h-3 text-white"
                  fill="currentColor"
                  viewBox="0 0 20 20"
                >
                  <path
                    fill-rule="evenodd"
                    d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                    clip-rule="evenodd"
                  />
                </svg>
              </div>
            </div>
            <div class="ml-4 text-left">
              <h4 class="font-bold text-xl text-gray-900">
                {{ getCurrentTestimonial().name }}
              </h4>
              <p class="text-gray-600">
                {{ getCurrentTestimonial().position }}
                <span
                  *ngIf="getCurrentTestimonial().company"
                  class="text-primary-600"
                >
                  at {{ getCurrentTestimonial().company }}
                </span>
              </p>
            </div>
          </div>
        </div>
      </mat-card>
    </div>
  </div>

  <!-- Navigation Arrows -->
  <div
    *ngIf="showArrows && testimonials.length > 1"
    class="absolute top-1/2 left-0 right-0 transform -translate-y-1/2 flex justify-between px-4"
  >
    <button
      (click)="previousSlide()"
      class="w-10 h-10 md:w-12 md:h-12 bg-white hover:bg-primary-600 rounded-full shadow-lg flex items-center justify-center transition-all duration-300 hover:scale-110 group"
    >
      <svg
        class="w-5 h-5 md:w-6 md:h-6 text-gray-600 group-hover:text-white"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 19l-7-7 7-7"
        ></path>
      </svg>
    </button>
    <button
      (click)="nextSlide()"
      class="w-10 h-10 md:w-12 md:h-12 bg-white hover:bg-primary-600 rounded-full shadow-lg flex items-center justify-center transition-all duration-300 hover:scale-110 group"
    >
      <svg
        class="w-5 h-5 md:w-6 md:h-6 text-gray-600 group-hover:text-white"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9 5l7 7-7 7"
        ></path>
      </svg>
    </button>
  </div>

  <!-- Dots Navigation -->
  <div
    *ngIf="showDots && testimonials.length > 1"
    class="flex justify-center mt-8 space-x-2"
  >
    <button
      *ngFor="let testimonial of testimonials; let i = index"
      (click)="goToSlide(i)"
      [class]="
        'w-2 h-2 md:w-3 md:h-3 rounded-full transition-all duration-300 ' +
        (currentIndex === i
          ? 'bg-primary-600 w-6 md:w-8'
          : 'bg-gray-300 hover:bg-primary-400')
      "
    ></button>
  </div>

  <!-- Auto-play Indicator -->
  <div
    *ngIf="autoPlay && testimonials.length > 1"
    class="absolute bottom-0 left-1/2 transform -translate-x-1/2 mb-2"
  >
    <div class="flex space-x-1">
      <div class="w-1 h-1 bg-primary-400 rounded-full animate-pulse"></div>
      <div
        class="w-1 h-1 bg-primary-400 rounded-full animate-pulse animation-delay-200"
      ></div>
      <div
        class="w-1 h-1 bg-primary-400 rounded-full animate-pulse animation-delay-400"
      ></div>
    </div>
  </div>
</div>
