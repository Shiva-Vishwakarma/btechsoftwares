<mat-card
  class="group hover:shadow-xl transition-all duration-300 hover:-translate-y-2"
>
  <div class="relative overflow-hidden rounded-t-lg">
    <img
      [src]="member.image"
      [alt]="member.name"
      class="w-full h-64 object-cover group-hover:scale-110 transition-transform duration-500"
    />
    <div
      class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-40 transition-all duration-300"
    ></div>
  </div>
  <div class="p-6 text-center">
    <h3 class="text-xl font-bold mb-1">{{ member.name }}</h3>
    <p class="text-primary-600 font-semibold mb-3">{{ member.position }}</p>
    <p class="text-gray-600 text-sm mb-4">
      {{ member.bio | slice: 0 : 100 }}...
    </p>

    <div class="flex justify-center space-x-3 mb-4">
      <a
        *ngIf="member.socialLinks.linkedin"
        [href]="member.socialLinks.linkedin"
        target="_blank"
        class="w-8 h-8 bg-gray-100 hover:bg-primary-600 rounded-full flex items-center justify-center transition-colors duration-300"
      >
        <svg
          class="w-4 h-4 text-gray-600 hover:text-white"
          fill="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"
          />
          <circle cx="4" cy="4" r="2" />
        </svg>
      </a>
      <a
        *ngIf="member.socialLinks.twitter"
        [href]="member.socialLinks.twitter"
        target="_blank"
        class="w-8 h-8 bg-gray-100 hover:bg-primary-600 rounded-full flex items-center justify-center transition-colors duration-300"
      >
        <svg
          class="w-4 h-4 text-gray-600 hover:text-white"
          fill="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"
          />
        </svg>
      </a>
      <a
        *ngIf="member.socialLinks.github"
        [href]="member.socialLinks.github"
        target="_blank"
        class="w-8 h-8 bg-gray-100 hover:bg-primary-600 rounded-full flex items-center justify-center transition-colors duration-300"
      >
        <svg
          class="w-4 h-4 text-gray-600 hover:text-white"
          fill="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"
          />
        </svg>
      </a>
    </div>

    <button
      mat-stroked-button
      color="primary"
      [routerLink]="['/team', member.id]"
      class="w-full"
    >
      View Profile
    </button>
  </div>
</mat-card>
